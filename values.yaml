deployment:
  replicas: 2

config:
  envoyGateway:
    gateway:
      controllerName: gateway.envoyproxy.io/gatewayclass-controller

    logging:
      level:
        default: info

    extensionApis:
      enableEnvoyPatchPolicy: true
      enableBackend: true
      enableBackendTrafficPolicy: true
      enableSecurityPolicy: true