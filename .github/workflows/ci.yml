name: OpenTofu Pipeline

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        type: choice
        options:
          - plan
          - deploy
          - destroy

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  TF_WORKING_DIR: ./

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.5

      - name: OpenTofu Init
        run: tofu init -input=false -reconfigure
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Check action type
        id: check
        run: echo "should_run=true" >> $GITHUB_OUTPUT

  fmt:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.5

      - name: OpenTofu Init
        run: tofu init -input=false -reconfigure
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: OpenTofu Format Check
        run: tofu fmt -check -recursive
        working-directory: ${{ env.TF_WORKING_DIR }}

  validate:
    runs-on: ubuntu-latest
    needs: [setup, fmt]
    if: github.event.inputs.action != 'destroy'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.5

      - name: OpenTofu Init
        run: tofu init -input=false -reconfigure
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: OpenTofu Validate
        run: tofu validate
        working-directory: ${{ env.TF_WORKING_DIR }}

  plan:
    runs-on: ubuntu-latest
    needs: [setup, validate]
    if: github.event.inputs.action == 'plan' || github.event.inputs.action == 'deploy'
    env:
      TF_VAR_flux_github_token: ${{ secrets.FLUX_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.5

      - name: OpenTofu Init
        run: tofu init -input=false -reconfigure
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: OpenTofu Plan
        id: plan
        run: tofu plan -input=false -out=tfplan -no-color
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan

      - name: Show Plan Summary
        run: |
          echo "=== OpenTofu Plan Summary ==="
          tofu show -no-color tfplan | head -n 100
          echo ""
          echo "Plan: $(tofu show -no-color tfplan | grep -E 'Plan:|to add|to change|to destroy' || echo 'Plan summary not found')"
        working-directory: ${{ env.TF_WORKING_DIR }}

  deploy:
    runs-on: ubuntu-latest
    needs: plan
    if: github.event.inputs.action == 'deploy'
    environment: production
    env:
      TF_VAR_flux_github_token: ${{ secrets.FLUX_GITHUB_TOKEN }} 
    steps:
      - uses: actions/checkout@v4

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.5

      - name: OpenTofu Init
        run: tofu init -input=false -reconfigure
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: OpenTofu Apply
        run: tofu apply -input=false -auto-approve tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

  destroy:
    runs-on: ubuntu-latest
    needs: setup
    if: github.event.inputs.action == 'destroy'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.5

      - name: OpenTofu Init
        run: tofu init -input=false -reconfigure
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: OpenTofu Destroy
        run: tofu destroy -auto-approve
        working-directory: ${{ env.TF_WORKING_DIR }}
        
